<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: #fff;
    text-align: center;
}
.container {
    padding: 30px;
}
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    color: gold;
}
.section {
    margin: 40px 0;
}
img {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
}
.button {
    display: inline-block;
    padding: 12px 20px;
    margin-top: 10px;
    background: gold;
    color: black;
    text-decoration: none;
    border-radius: 5px;
}
input, textarea {
    width: 90%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
}
</style>
</head>

<body>

<div class="container">

    <!-- COVER -->
    <div class="section">
        <h1>Andi & Siti</h1>
        <p>12 Desember 2026</p>
    </div>

    <!-- FOTO -->
    <div class="section">
        <img src="https://via.placeholder.com/400" alt="foto">
    </div>

    <!-- DETAIL -->
    <div class="section">
        <h2>Detail Acara</h2>
        <p>Akad: 08:00 WIB</p>
        <p>Resepsi: 10:00 WIB</p>
        <p>Gedung Serbaguna Bahagia</p>
    </div>

    <!-- MAPS -->
    <div class="section">
        <h2>Lokasi</h2>
        <a class="button" href="https://maps.google.com" target="_blank">Lihat Maps</a>
    </div>

    <!-- LOVE STORY -->
    <div class="section">
        <h2>Love Story</h2>
        <p>Kami bertemu pada tahun 2020 dan memulai perjalanan cinta kami...</p>
    </div>

    <!-- GALLERY -->
    <div class="section">
        <h2>Gallery</h2>
        <img src="https://via.placeholder.com/400">
        <img src="https://via.placeholder.com/400">
    </div>

    <!-- VIDEO -->
    <div class="section">
        <h2>Video</h2>
        <iframe width="100%" height="200"
        src="https://www.youtube.com/embed/VIDEO_ID"
        frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- AMplop Digital -->
    <div class="section">
        <h2>Amplop Digital</h2>
        <p>BCA: 123456789 a.n Andi</p>
    </div>

    <!-- RSVP -->
    <div class="section">
        <h2>Konfirmasi Kehadiran</h2>
        <form>
            <input type="text" placeholder="Nama"><br>
            <textarea placeholder="Ucapan"></textarea><br>
            <button class="button">Kirim</button>
        </form>
    </div>

</div>

</body>
</html>
